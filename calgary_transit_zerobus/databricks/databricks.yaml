# yaml-language-server: $schema=./bundle-schema.json
---
bundle:
  name: calgary_transit
experimental:
  skip_name_prefix_for_schema: true
  scripts:
    prebuild: uv export --package zerobus_app --no-dev --no-emit-workspace --no-hashes -o src/zerobus_app/requirements.txt
include:
  - resources/stable/*.yaml
  - resources/calgary_transit/*.yaml
sync:
  include:
    - src/zerobus_app/requirements.txt
variables:
  catalog_name:
    default: classic_stable_ptbvhz_ip
  workspace_url:
    description: URL of the target workspace, needed for zerobus
  zerobus_url:
    description: URL for the zerobus connection
targets:
  default:
    default: true
    mode: development
    workspace:
      profile: fevm-az
    variables:
      workspace_url: "https://adb-7405616154229592.12.azuredatabricks.net/"
      zerobus_url: "https://7405616154229592.zerobus.westus2.azuredatabricks.net"
