---
# yaml-language-server: $schema=../../bundle-schema.json
resources:
  catalogs:
    base:
      comment: "Managed by DABs"
      name: ${var.catalog_name}
  schemas:
    ingest:
      catalog_name: ${resources.catalogs.base.name}
      name: ingest
      comment: "Raw data landed for processing"
    artifacts:
      catalog_name: ${resources.catalogs.base.name}
      name: artifacts
      comment: "Stuff deployed by bundles"
  volumes:
    calgary_transit_ingest:
      catalog_name: ${resources.catalogs.base.name}
      schema_name: ${resources.schemas.ingest.name}
      name: calgary_transit
      volume_type: "MANAGED"
    artifacts_vol:
      catalog_name: ${resources.catalogs.base.name}
      schema_name: ${resources.schemas.artifacts.name}
      name: artifacts
      volume_type: "MANAGED"
