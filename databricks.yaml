# yaml-language-server: $schema=./bundle-schema.json
---
bundle:
  name: data_demos
experimental:
  skip_name_prefix_for_schema: true
include:
  - resources/stable/*.yaml
  - resources/calgary_transit/*.yaml
variables:
  catalog_name:
    default: ian_preston
artifacts:
  default:
    type: whl
    build: uv build
    dynamic_version: true
    path: .
targets:
  fe-east:
    default: true
    mode: development
    workspace:
      profile: field-eng-east
      artifact_path: "/Volumes/${var.catalog_name}/artifacts/artifacts/"
    variables:
      catalog_name: ian_preston
